services:
  sqlite:
    image: alpine:3.21
    container_name: sqlite_data_container_prod
    restart: unless-stopped
    command: sh -c "mkdir -p /data && touch /data/db.sqlite3 && tail -f /dev/null"
    volumes:
      - sqlite_data:/data

  web:
    build:
      context: .
      dockerfile: dockerfile.prod
    container_name: socialit_apache_django
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - sqlite
    volumes:
      - sqlite_data:/data
    environment:
      - SQLITE_PATH=/data/db.sqlite3
      - DJANGO_DEBUG=False

volumes:
  sqlite_data:
