{% extends "base.html" %}
{% load i18n %}
{% block title %}Crear Oferta de Empleo{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto px-4 py-6">
    <div class="flex items-center mb-6">
        <a href="{% url 'jobs:job_list' %}" class="flex items-center text-gray-600 dark:text-gray-300 hover:text-gray-900 dark:hover:text-white mr-4">
            <span class="material-icons-outlined text-2xl">arrow_back</span>
            <span class="ml-1 text-sm hidden md:inline">Regresar</span>
            <span class="ml-1 text-sm md:hidden">Ir atrás</span>
        </a>
        <h1 class="text-xl md:text-2xl font-bold text-gray-900 dark:text-white flex-1 text-center md:text-left pr-10 md:pr-0">
            Crear Oferta de Empleo
        </h1>
    </div>

    <div class="bg-gray-200 dark:bg-slate-800 rounded-2xl p-6 md:p-8">
        <form method="POST" action="{% url 'jobs:create_offer' %}">
            {% csrf_token %}

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-900 dark:text-white mb-2">
                    Nombre del Empleo
                </label>
                <div class="relative">
                    <div class="bg-gray-100 dark:bg-slate-700 rounded-lg border border-gray-300 dark:border-slate-600 px-4 py-3 flex items-center">
                        <div class="flex-1">
                            <input type="text" name="job_name" required
                                class="w-full bg-transparent text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none border-none p-0 focus:ring-0"
                                placeholder="Ingresa el nombre del empleo">
                        </div>
                        <button type="button" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 ml-2 flex-shrink-0" onclick="this.closest('.bg-gray-100').querySelector('input').value=''">
                            <span class="material-icons-outlined text-xl">cancel</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-900 dark:text-white mb-2">
                    Cargo del Empleo
                </label>
                <div class="relative">
                    <div class="bg-gray-100 dark:bg-slate-700 rounded-lg border border-gray-300 dark:border-slate-600 px-4 py-3 flex items-center">
                        <div class="flex-1">
                            <input type="text" name="job_position" required
                                class="w-full bg-transparent text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none border-none p-0 focus:ring-0"
                                placeholder="Ingresa el cargo del empleo">
                        </div>
                        <button type="button" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 ml-2 flex-shrink-0" onclick="this.closest('.bg-gray-100').querySelector('input').value=''">
                            <span class="material-icons-outlined text-xl">cancel</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-900 dark:text-white mb-2">
                    Descripción
                </label>
                <textarea name="description" rows="6" required
                    class="w-full bg-white dark:bg-slate-900 rounded-lg border border-gray-300 dark:border-slate-600 px-4 py-3 text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-none"
                    placeholder="Describe la oferta de empleo..."></textarea>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-900 dark:text-white mb-2">
                    Ubicación
                </label>
                <div class="relative">
                    <div class="bg-gray-100 dark:bg-slate-700 rounded-lg border border-gray-300 dark:border-slate-600 px-4 py-3 flex items-center">
                        <div class="flex-1">
                            <input type="text" name="location"
                                class="w-full bg-transparent text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none border-none p-0 focus:ring-0"
                                placeholder="Ingresa la ubicación">
                        </div>
                        <button type="button" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 ml-2 flex-shrink-0" onclick="this.closest('.bg-gray-100').querySelector('input').value=''">
                            <span class="material-icons-outlined text-xl">cancel</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <label class="block text-sm font-bold text-gray-900 dark:text-white mb-2">
                    Rango de salario (Opcional)
                </label>
                <div class="relative">
                    <div class="bg-gray-100 dark:bg-slate-700 rounded-lg border border-gray-300 dark:border-slate-600 px-4 py-3 flex items-center">
                        <div class="flex-1">
                            <input type="text" name="salary_range"
                                class="w-full bg-transparent text-sm text-gray-900 dark:text-white placeholder-gray-400 outline-none border-none p-0 focus:ring-0"
                                placeholder="Ingresa el rango de salario">
                        </div>
                        <button type="button" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 ml-2 flex-shrink-0" onclick="this.closest('.bg-gray-100').querySelector('input').value=''">
                            <span class="material-icons-outlined text-xl">cancel</span>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit"
                class="inline-flex items-center gap-2 bg-gray-900 dark:bg-slate-700 text-white px-8 py-3 rounded-full text-sm font-semibold hover:bg-gray-800 dark:hover:bg-slate-600 transition-colors shadow-md">
                <span class="material-icons-outlined text-lg">add</span>
                Crear Oferta
            </button>
        </form>
    </div>
</div>
{% endblock %}
