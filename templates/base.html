<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}SocialIT - Professional Network{% endblock %}</title>
    
    {% load static %}
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Material+Icons+Outlined&amp;display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#145c7c",
                        "background-light": "#f3f4f6",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                },
            },
        };
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-icons-outlined {
            font-size: 24px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 12px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: color 0.2s;
            min-width: 80px;
        }
        .nav-item:hover, .nav-item.active {
            color: white;
        }
        .nav-item.active {
            border-bottom: 2px solid white;
        }
        .nav-item span:last-child {
            font-size: 12px;
            margin-top: 2px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark transition-colors duration-200">
    
    {% include 'navbar.html' %}
    
    {% block content %}{% endblock %}
    
    <button class="fixed bottom-6 right-6 bg-primary text-white p-3 rounded-full shadow-lg z-50" onclick="document.documentElement.classList.toggle('dark')">
        <span class="material-icons-outlined">dark_mode</span>
    </button>
</body>
</html>
