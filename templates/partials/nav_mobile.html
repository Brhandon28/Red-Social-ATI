{% load static %}
{% load i18n %}
<nav
      class="md:hidden fixed bottom-0 left-0 right-0 z-50 bg-navy border-t border-white/10 flex justify-around items-center h-[60px]"
      aria-label="{% trans 'Navegación rápida' %}"
    >
      {% with current_ns=request.resolver_match.namespace current_name=request.resolver_match.url_name %}
      <a
        href="{% url 'feed:index' %}"
        class="flex items-center justify-center p-2 text-primary hover:text-primary-light transition-colors {% if current_ns == 'feed' and current_name == 'index' %}text-white{% endif %} {% block mobile_nav_feed %}{% endblock %}"
        {% if current_ns == 'feed' and current_name == 'index' %}aria-current="page"{% endif %}
      >
        <svg
          class="w-8 h-8"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
      <a
        href="{% url 'feed:create_post' %}"
        class="flex items-center justify-center p-2 text-primary hover:text-primary-light transition-colors {% if current_ns == 'feed' and current_name == 'create_post' %}text-white{% endif %} {% block mobile_nav_create %}{% endblock %}"
        {% if current_ns == 'feed' and current_name == 'create_post' %}aria-current="page"{% endif %}
      >
        <svg
          class="w-8 h-8"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="16" />
          <line x1="8" y1="12" x2="16" y2="12" />
        </svg>
      </a>
      <a
        href="{% url 'network:contacts' %}"
        class="flex items-center justify-center p-2 text-primary hover:text-primary-light transition-colors {% if current_ns == 'network' %}text-white{% endif %} {% block mobile_nav_contacts %}{% endblock %}"
        {% if current_ns == 'network' %}aria-current="page"{% endif %}
      >
        <svg
          class="w-8 h-8"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
          <path d="M16 3.13a4 4 0 0 1 0 7.75" />
        </svg>
      </a>
      <a
        href="{% url 'jobs:job_list' %}"
        class="flex items-center justify-center p-2 text-primary hover:text-primary-light transition-colors {% if current_ns == 'jobs' %}text-white{% endif %} {% block mobile_nav_jobs %}{% endblock %}"
        {% if current_ns == 'jobs' %}aria-current="page"{% endif %}
      >
        <svg
          class="w-8 h-8"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
        </svg>
      </a>
      {% endwith %}
    </nav>
